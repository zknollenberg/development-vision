name: Nightly Celina Refresh

on:
  schedule:
    - cron: "15 08 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh public-web snapshot
        run: node scripts/refresh-demo-data.mjs

      - name: Commit refresh output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh Celina demo snapshot"
